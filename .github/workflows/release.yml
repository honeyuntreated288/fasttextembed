name: Release

# One-click release automation. Create a GitHub Release (tag e.g. `v1.0.1`) and this publishes
# every binding from its source of truth:
#   - PyPI    (pip)      — prebuilt wheels + sdist
#   - npm     (Node/JS)  — WASM package (built via Emscripten)
#   - crates.io (Rust)   — source crate with the vendored C engine
#   - Go                 — creates the `bindings/go/vX.Y.Z` submodule tag + warms the module proxy
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   PYPI_TOKEN    — PyPI API token (https://pypi.org/manage/account/token/)
#   NPM_TOKEN     — npm automation token (https://www.npmjs.com/settings/<user>/tokens)
#   CARGO_TOKEN   — crates.io API token (https://crates.io/settings/tokens)
# Go needs no secret — it tags the repo using the built-in GITHUB_TOKEN.
#
# The release tag MUST be `v<version>` matching the version in each binding's manifest (1.0.1).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # Build the Python wheels + sdist (reused from build-wheels.yml); artifacts feed the pypi job.
  build-wheels:
    uses: ./.github/workflows/build-wheels.yml

  pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download wheels + sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true # flatten wheels-* and sdist into dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
      - name: Publish (prepublishOnly builds the WASM module)
        working-directory: bindings/js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Vendor C engine into the crate
        run: bash bindings/rust/vendor.sh
      - name: Publish
        working-directory: bindings/rust
        # --allow-dirty: csrc/ is gitignored + regenerated by vendor.sh (it ships via Cargo `include`).
        run: cargo publish --allow-dirty --token ${{ secrets.CARGO_TOKEN }}

  go:
    name: Tag Go module
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the submodule tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create bindings/go/vX.Y.Z tag + warm proxy
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"                       # v1.0.1 -> 1.0.1
          GOTAG="bindings/go/v${VERSION}"          # Go submodule tag format
          if git rev-parse -q --verify "refs/tags/${GOTAG}" >/dev/null; then
            echo "tag ${GOTAG} already exists — skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${GOTAG}" "${TAG}^{commit}"
            git push origin "${GOTAG}"
          fi
          # Trigger proxy.golang.org to index the new version (best-effort).
          curl -fsSL "https://proxy.golang.org/github.com/cemsina/fasttextembed/bindings/go/@v/v${VERSION}.info" || true
